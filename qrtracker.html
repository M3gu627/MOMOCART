<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MOMO-CART • QR Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        input, select, button { touch-action: manipulation; }

        thead th {
            font-size: 10px;
            letter-spacing: 0.08em;
            font-weight: 700;
            text-transform: uppercase;
        }
        .stat-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #94a3b8;
        }
        .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .table-container table { min-width: 680px; }

        /* QR reader */
        #qr-reader { border: none !important; }
        #qr-reader video { border-radius: 1rem; }
        #qr-reader img { display: none !important; }
        #qr-reader__scan_region { border-radius: 1rem; overflow: hidden; }
        #qr-reader__dashboard_section_csr button {
            background: #10b981 !important;
            color: white !important;
            border: none !important;
            border-radius: 0.75rem !important;
            padding: 8px 20px !important;
            font-weight: 700 !important;
            font-size: 13px !important;
            cursor: pointer !important;
            margin-top: 8px !important;
        }
        #qr-reader__dashboard_section_fsr { display: none !important; }
        #qr-reader__dashboard_section_swaplink { display: none !important; }
        #qr-reader__status_span { color: #64748b; font-size: 11px; }

        .mode-btn {
            flex: 1;
            padding: 10px 0;
            font-weight: 700;
            font-size: 13px;
            border-radius: 10px;
            transition: all 0.2s ease;
            color: #64748b;
        }
        .mode-btn.active-in  { background: #d1fae5; color: #065f46; box-shadow: 0 2px 8px rgba(16,185,129,0.15); }
        .mode-btn.active-out { background: #fee2e2; color: #991b1b; box-shadow: 0 2px 8px rgba(239,68,68,0.15); }

        .badge-in  { background: #d1fae5; color: #065f46; }
        .badge-out { background: #e2e8f0; color: #475569; }
        .badge-ot  { background: #fef3c7; color: #92400e; }

        #nav-drawer {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(-100%);
        }
        #nav-drawer.open { transform: translateX(0); }
        #drawer-backdrop { transition: opacity 0.3s ease; opacity: 0; pointer-events: none; }
        #drawer-backdrop.open { opacity: 1; pointer-events: all; }

        #toast {
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            transform: translateY(20px);
            opacity: 0;
            pointer-events: none;
        }
        #toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body class="min-h-screen bg-[#f1f5f9]">

    <!-- ── PAGE LOADER ── -->
    <div id="page-loader">
        <div class="spinner-ring"></div>
        <span>Loading…</span>
    </div>

    <!-- ── TOAST ── -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[200] px-5 py-3 rounded-2xl shadow-xl flex items-center gap-3 text-sm font-bold text-white min-w-[240px] justify-center">
        <span id="toast-icon" class="text-lg"></span>
        <span id="toast-msg"></span>
    </div>

    <!-- ── DRAWER BACKDROP ── -->
    <div id="drawer-backdrop" class="fixed inset-0 bg-black/50 z-[90] backdrop-blur-sm" onclick="closeDrawer()"></div>

    <!-- ── NAV DRAWER ── -->
    <div id="nav-drawer" class="fixed top-0 left-0 h-full w-64 bg-[#0f172a] z-[100] shadow-2xl flex flex-col">
        <div class="h-14 flex items-center justify-between px-4 border-b border-white/10">
            <span class="title-font font-bold text-white">
                <span class="text-[#fde047]">MOMO</span><span class="text-[#22d3ee]">Cart</span>
            </span>
            <button onclick="closeDrawer()" class="w-8 h-8 flex items-center justify-center rounded-lg bg-white/10 hover:bg-white/20 transition-colors">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <nav class="flex-1 py-4 px-3 space-y-1">
            <a href="dashboard.html"
               class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-white/10 hover:text-white transition-colors font-semibold text-sm group">
                <div class="w-8 h-8 rounded-lg bg-white/10 group-hover:bg-emerald-500/20 flex items-center justify-center transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                </div>
                Logbook
            </a>
            <a href="attendance.html"
               class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-white/10 hover:text-white transition-colors font-semibold text-sm group">
                <div class="w-8 h-8 rounded-lg bg-white/10 group-hover:bg-cyan-500/20 flex items-center justify-center transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                Attendance
            </a>
            <a href="qrtracker.html"
               class="flex items-center gap-3 px-4 py-3 rounded-xl bg-[#22d3ee]/20 text-[#22d3ee] font-bold text-sm">
                <div class="w-8 h-8 rounded-lg bg-[#22d3ee]/20 flex items-center justify-center">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/>
                    </svg>
                </div>
                QR Tracker
            </a>
        </nav>
        <div class="px-4 py-4 border-t border-white/10 space-y-3">
            <button onclick="logout()"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:bg-red-500/10 hover:text-red-300 transition-colors font-semibold text-sm">
                <div class="w-8 h-8 rounded-lg bg-red-500/10 flex items-center justify-center">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                Sign Out
            </button>
            <p class="text-[9px] text-slate-500 uppercase tracking-widest text-center">MOMO-CART Digital System</p>
        </div>
    </div>

    <!-- ── NAV ── -->
    <nav class="bg-[#0f172a] text-white fixed top-0 left-0 right-0 z-50 border-b border-white/10">
        <div class="max-w-[1400px] mx-auto px-4 h-14 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <button onclick="openDrawer()" class="w-9 h-9 flex items-center justify-center rounded-lg bg-white/10 hover:bg-white/20 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
                <img src="logo.png" alt="MOMOCart" class="h-8 object-contain"
                     onerror="this.style.display='none'; document.getElementById('nav-logo-fallback').style.display='block'">
                <span id="nav-logo-fallback" style="display:none" class="title-font text-lg font-bold tracking-tight">
                    <span class="text-[#fde047]">MOMO</span><span class="text-[#22d3ee]">Cart</span>
                </span>
                <div class="h-5 w-px bg-white/20 mx-1"></div>
                <span class="text-[10px] text-slate-400 uppercase tracking-widest font-semibold hidden sm:block">QR Tracker</span>
            </div>
            <div class="flex items-center gap-3">
                <div class="text-right hidden sm:block">
                    <p id="user-name" class="text-xs font-bold leading-none text-white"></p>
                    <p id="user-role" class="text-[9px] text-cyan-400 uppercase tracking-widest mt-1"></p>
                </div>
                <button onclick="logout()"
                        class="flex items-center gap-2 bg-white/10 hover:bg-white/20 px-3 py-2 rounded-lg text-xs font-semibold transition-colors min-h-[36px]">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span class="hidden sm:inline">Sign Out</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- ── MAIN ── -->
    <main class="max-w-[1400px] mx-auto px-3 sm:px-4 pb-24" style="padding-top:72px">

        <!-- Header -->
        <div class="glass-card rounded-2xl p-4 sm:p-5 mb-4 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3">
            <div class="flex flex-wrap gap-5 items-end">
                <div>
                    <p class="stat-label mb-1">Date</p>
                    <input id="tracker-date" type="date"
                           class="bg-transparent font-bold text-base sm:text-lg focus:ring-0 border-none p-0 text-slate-800">
                </div>
                <div id="branch-filter-wrap" class="hidden">
                    <p class="stat-label mb-1">Branch</p>
                    <select id="branch-filter" onchange="loadCartLogs()"
                            class="bg-white border border-slate-200 rounded-xl px-3 py-1.5 text-sm font-bold text-slate-700 focus:ring-2 focus:ring-cyan-400 focus:outline-none shadow-sm">
                        <option value="all">All Branches</option>
                        <option value="pampanga">Pampanga</option>
                        <option value="baliwag">Baliwag</option>
                        <option value="trinoma">Trinoma</option>
                        <option value="smartwheels">Smart Wheels</option>
                        <option value="bataan">Bataan</option>
                    </select>
                </div>
                <div>
                    <p class="stat-label mb-1">Active</p>
                    <p id="stat-active" class="font-bold text-lg text-emerald-600">0</p>
                </div>
                <div>
                    <p class="stat-label mb-1">Returned</p>
                    <p id="stat-returned" class="font-bold text-lg text-slate-700">0</p>
                </div>
                <div>
                    <p class="stat-label mb-1">Overtime</p>
                    <p id="stat-overtime" class="font-bold text-lg text-amber-600">0</p>
                </div>
            </div>
            <button onclick="openScanModal()"
                    class="btn-gradient flex items-center gap-2 text-white font-bold text-sm px-5 py-3 rounded-xl shadow-md whitespace-nowrap">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/>
                </svg>
                Scan QR Code
            </button>
        </div>

        <!-- Table -->
        <div class="glass-card rounded-2xl overflow-hidden">
            <div class="px-4 sm:px-5 py-3 border-b border-slate-100 flex items-center justify-between">
                <h2 class="font-bold text-sm text-slate-700 uppercase tracking-widest">Cart Log</h2>
                <span id="loading-indicator" class="hidden items-center gap-1.5">
                    <span style="width:14px;height:14px;border-radius:50%;border:2px solid transparent;border-top-color:#22d3ee;border-right-color:#fde047;animation:spinner-spin 0.8s cubic-bezier(0.4,0,0.2,1) infinite;display:inline-block;"></span>
                    <span class="text-[10px] text-slate-400 font-bold">Loading…</span>
                </span>
            </div>
            <div class="table-container">
                <table class="w-full">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr id="table-head-row">
                            <th class="px-4 py-3 text-left">Cart #</th>
                            <th class="px-4 py-3 text-left">Type</th>
                            <th class="px-4 py-3 text-left">Valid ID</th>
                            <th class="px-4 py-3 text-left">Time In</th>
                            <th class="px-4 py-3 text-left">Time Out</th>
                            <th class="px-4 py-3 text-left">Duration</th>
                            <th class="px-4 py-3 text-left">Overtime</th>
                            <th class="px-4 py-3 text-left">Status</th>
                            <th class="px-4 py-3 text-left">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tracker-table-body">
                        <tr><td colspan="8" class="px-4 py-10 text-center text-slate-400 text-sm">Loading…</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- ── SCAN MODAL ── -->
    <dialog id="scan-modal" class="rounded-2xl shadow-2xl p-0 w-full max-w-sm mx-auto bg-white">
        <div class="flex flex-col">
            <div class="bg-[#0f172a] px-5 py-4 rounded-t-2xl flex items-center justify-between">
                <div>
                    <h3 class="font-bold text-white text-sm title-font">QR Scanner</h3>
                    <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-0.5" id="modal-mode-label">Select mode then scan</p>
                </div>
                <button onclick="closeScanModal()" class="w-8 h-8 flex items-center justify-center rounded-lg bg-white/10 hover:bg-white/20 transition-colors">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="p-5 space-y-4">
                <!-- Mode Toggle -->
                <div class="flex gap-2 bg-slate-100 p-1 rounded-xl">
                    <button id="mode-in-btn"  class="mode-btn active-in"  onclick="setMode('in')">✅ Time In</button>
                    <button id="mode-out-btn" class="mode-btn"             onclick="setMode('out')">🔴 Time Out</button>
                </div>
                <!-- Duration & ID Type (Time In only) -->
                <div id="timein-options" class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="stat-label block mb-1">Duration</label>
                        <select id="scan-duration" class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm font-bold focus:ring-2 focus:ring-cyan-400 focus:outline-none">
                            <option value="60" selected>1 hr</option>
                            <option value="120">2 hrs</option>
                            <option value="180">3 hrs</option>
                            <option value="15kiddie">15 min (Kiddie)</option>
                            <option value="unlimited">Unlimited</option>
                        </select>
                    </div>
                    <div>
                        <label class="stat-label block mb-1">ID Type</label>
                        <select id="scan-idtype" class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm font-bold focus:ring-2 focus:ring-cyan-400 focus:outline-none">
                            <option value="regular" selected>Regular</option>
                            <option value="senior">Senior</option>
                            <option value="pwd">PWD</option>
                        </select>
                    </div>
                </div>
                <!-- Scanner -->
                <div>
                    <div id="qr-reader" class="w-full rounded-xl overflow-hidden bg-slate-900" style="display:none"></div>
                    <div id="scanner-placeholder" class="w-full h-48 rounded-xl bg-slate-900 flex flex-col items-center justify-center gap-2">
                        <svg class="w-12 h-12 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                        <p class="text-slate-500 text-xs font-semibold">Starting camera…</p>
                    </div>
                </div>
                <!-- Scan feedback -->
                <div id="scan-feedback" class="hidden rounded-xl px-4 py-3 flex items-center gap-3">
                    <span id="feedback-icon" class="text-2xl"></span>
                    <div>
                        <p id="feedback-cart" class="font-bold text-sm text-slate-800"></p>
                        <p id="feedback-type" class="text-xs text-slate-500"></p>
                    </div>
                </div>
                <!-- Manual fallback -->
                <div>
                    <button onclick="toggleManual()" class="text-[11px] font-bold text-slate-400 hover:text-cyan-600 transition-colors underline">
                        Enter manually instead
                    </button>
                    <div id="manual-area" class="hidden mt-3 space-y-2">
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="stat-label block mb-1">Cart #</label>
                                <input id="manual-cart" type="text" placeholder="e.g. WC-01"
                                       class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm font-bold focus:ring-2 focus:ring-cyan-400 focus:outline-none">
                            </div>
                            <div>
                                <label class="stat-label block mb-1">Cart Type</label>
                                <select id="manual-type" class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm font-bold focus:ring-2 focus:ring-cyan-400 focus:outline-none">
                                    <option value="">Select…</option>
                                    <option value="wheelchair">Wheelchair</option>
                                    <option value="kiddiecart">Kiddie Cart</option>
                                    <option value="scooter">Scooter</option>
                                </select>
                            </div>
                            <div>
                                <label class="stat-label block mb-1">Duration</label>
                                <select id="manual-duration" class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm font-bold focus:ring-2 focus:ring-cyan-400 focus:outline-none">
                                    <option value="60" selected>1 hr</option>
                                    <option value="120">2 hrs</option>
                                    <option value="180">3 hrs</option>
                                    <option value="15kiddie">15 min (Kiddie)</option>
                                    <option value="unlimited">Unlimited</option>
                                </select>
                            </div>
                            <div>
                                <label class="stat-label block mb-1">ID Type</label>
                                <select id="manual-idtype" class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm font-bold focus:ring-2 focus:ring-cyan-400 focus:outline-none">
                                    <option value="regular" selected>Regular</option>
                                    <option value="senior">Senior</option>
                                    <option value="pwd">PWD</option>
                                </select>
                            </div>
                        </div>
                        <button onclick="submitManual()"
                                class="w-full btn-gradient text-white font-bold text-sm py-2.5 rounded-xl">
                            Log Entry
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </dialog>

    <script src="globals.js?v=8"></script>
    <script>
    let scanMode      = 'in';
    let html5QrCode   = null;
    let scannerRunning = false;
    let debounceTimer  = null;
    let cartRecords    = [];
    let activeByCart   = {}; // cartNum → { id, time_in }

    // ── INIT ──
    async function initPage() {
        try {
            const res  = await apiFetch('api.php?action=checkSession');
            const data = await res.json();
            if (!data.success || !data.user) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = data.user;

            // Set user display
            const el = document.getElementById('user-name');
            const rl = document.getElementById('user-role');
            if (el) el.textContent = currentUser.displayName || currentUser.username || '';
            if (rl) rl.textContent = currentUser.role === 'admin' ? 'Administrator' : (currentUser.username || currentUser.role || '');

            // Admin-specific UI
            if (currentUser.role === 'admin') {
                document.getElementById('branch-filter-wrap').classList.remove('hidden');
            }

            // Set today's date (local PH time)
            const today = new Date();
            document.getElementById('tracker-date').value =
                today.getFullYear() + '-' +
                String(today.getMonth() + 1).padStart(2, '0') + '-' +
                String(today.getDate()).padStart(2, '0');

            await loadCartLogs();
            setInterval(renderTable, 60000); // refresh live durations every minute
        } catch (e) {
            console.error('Init failed:', e);
            window.location.href = 'index.html';
        } finally {
            const loader = document.getElementById('page-loader');
            if (loader) loader.style.display = 'none';
        }
    }

    document.addEventListener('DOMContentLoaded', initPage);

    // ── AUTH ──
    async function logout() {
        await apiFetch('api.php?action=logout');
        window.location.href = 'index.html';
    }

    // ── DRAWER ──
    function openDrawer() {
        document.getElementById('nav-drawer').classList.add('open');
        document.getElementById('drawer-backdrop').classList.add('open');
    }
    function closeDrawer() {
        document.getElementById('nav-drawer').classList.remove('open');
        document.getElementById('drawer-backdrop').classList.remove('open');
    }

    // ── LOAD FROM API ──
    async function loadCartLogs() {
        const date   = document.getElementById('tracker-date').value;
        const branch = document.getElementById('branch-filter')?.value || 'all';
        const li = document.getElementById('loading-indicator');
        if (li) { li.classList.remove('hidden'); li.style.display = 'inline-flex'; }
        try {
            let url = `api.php?action=getCartLogs&date=${date}`;
            if (branch && branch !== 'all') url += `&branch=${branch}`;
            const res    = await apiFetch(url);
            const result = await res.json();
            if (result.success) {
                cartRecords  = result.records || [];
                activeByCart = {};
                cartRecords.forEach(r => {
                    if (!r.time_out) activeByCart[r.cart_num] = { id: r.id, time_in: r.time_in };
                });
                renderTable();
            } else {
                showToast('❌', result.message || 'Failed to load records', '#ef4444');
            }
        } catch (e) {
            showToast('❌', 'Network error loading records', '#ef4444');
        } finally {
            const li2 = document.getElementById('loading-indicator');
            if (li2) { li2.classList.add('hidden'); li2.style.display = 'none'; }
        }
    }

    // ── SCAN MODAL ──
    function openScanModal() {
        document.getElementById('scan-modal').showModal();
        document.getElementById('scanner-placeholder').style.display = 'flex';
        document.getElementById('qr-reader').style.display = 'none';
        document.getElementById('scan-feedback').classList.add('hidden');
        setMode('in');
        startScanner();
    }
    function closeScanModal() {
        stopScanner();
        document.getElementById('scan-modal').close();
    }

    // ── MODE ──
    function setMode(mode) {
        scanMode = mode;
        document.getElementById('mode-in-btn').className  = 'mode-btn' + (mode === 'in'  ? ' active-in'  : '');
        document.getElementById('mode-out-btn').className = 'mode-btn' + (mode === 'out' ? ' active-out' : '');
        document.getElementById('modal-mode-label').textContent =
            mode === 'in' ? 'Scan to log Time In' : 'Scan to log Time Out';
        document.getElementById('timein-options').style.display = mode === 'in' ? 'grid' : 'none';
    }

    // ── SCANNER ──
    function startScanner() {
        if (scannerRunning) return;
        document.getElementById('scanner-placeholder').style.display = 'none';
        document.getElementById('qr-reader').style.display = 'block';
        html5QrCode = new Html5Qrcode('qr-reader');
        Html5Qrcode.getCameras().then(cameras => {
            if (!cameras?.length) { showToast('❌', 'No camera found', '#ef4444'); return; }
            const cam = cameras.find(c => /back|rear|environment/i.test(c.label)) || cameras[cameras.length - 1];
            html5QrCode.start(
                cam.id,
                { fps: 10, qrbox: { width: 220, height: 220 }, aspectRatio: 1.0 },
                onScanSuccess, () => {}
            ).then(() => scannerRunning = true)
             .catch(() => showToast('❌', 'Camera error', '#ef4444'));
        }).catch(() => showToast('❌', 'Camera permission denied', '#ef4444'));
    }
    function stopScanner() {
        if (html5QrCode && scannerRunning) {
            html5QrCode.stop().then(() => { html5QrCode.clear(); scannerRunning = false; })
                              .catch(() => { scannerRunning = false; });
        }
    }

    // ── QR DECODE ──
    function onScanSuccess(decodedText) {
        if (debounceTimer) return;
        debounceTimer = setTimeout(() => { debounceTimer = null; }, 2500);
        let cartData;
        try {
            cartData = JSON.parse(decodedText);
        } catch (e) {
            const parts = decodedText.split('|');
            cartData = parts.length >= 2
                ? { cartNum: parts[0].trim(), cartType: parts[1].trim() }
                : { cartNum: decodedText.trim(), cartType: 'unknown' };
        }
        if (!cartData?.cartNum) { showToast('❌', 'Invalid QR code', '#ef4444'); return; }
        processCartScan(cartData.cartNum, cartData.cartType || 'unknown');
    }

    // ── PROCESS SCAN → API ──
    async function processCartScan(cartNum, cartType, duration, idType) {
        // Fall back to modal selectors for QR-scanned entries
        if (!duration) duration = document.getElementById('scan-duration')?.value || '60';
        if (!idType)   idType   = document.getElementById('scan-idtype')?.value   || 'regular';

        if (scanMode === 'in') {
            if (activeByCart[cartNum]) {
                showFeedback('⚠️', cartNum, 'Already checked in!', '#fef3c7');
                showToast('⚠️', 'Cart already Time In!', '#f59e0b');
                return;
            }
            showFeedback('⏳', 'Saving…', cartNum + ' — ' + cartType, '#f1f5f9');
            try {
                const res    = await apiFetch('api.php?action=cartTimeIn', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        cartNum,
                        cartType,
                        duration: duration,
                        idType:   idType
                    })
                });
                const result = await res.json();
                if (result.success) {
                    showFeedback('✅', cartNum + ' — ' + cartType, 'Time In logged', '#d1fae5');
                    showToast('✅', 'Time In logged for ' + cartNum, '#10b981');
                    await loadCartLogs();
                } else {
                    showFeedback('❌', cartNum, result.message || 'Error', '#fee2e2');
                    showToast('❌', result.message || 'Error saving', '#ef4444');
                }
            } catch (e) {
                showToast('❌', 'Network error — try again', '#ef4444');
            }
        } else {
            const active = activeByCart[cartNum];
            if (!active) {
                showFeedback('❌', cartNum, 'Not checked in or already returned', '#fee2e2');
                showToast('❌', 'Cart not found / already returned', '#ef4444');
                return;
            }
            showFeedback('⏳', 'Saving…', 'Time Out for ' + cartNum, '#f1f5f9');
            try {
                const res    = await apiFetch('api.php?action=cartTimeOut', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: active.id })
                });
                const result = await res.json();
                if (result.success) {
                    const otMsg = result.overtime_minutes ? ' · OT: ' + result.overtime_minutes + ' min' : '';
                    showFeedback('🔴', cartNum + ' returned', 'Time Out logged' + otMsg, '#fee2e2');
                    showToast('🔴', 'Time Out logged for ' + cartNum, '#ef4444');
                    await loadCartLogs();
                } else {
                    showFeedback('❌', cartNum, result.message || 'Error', '#fee2e2');
                    showToast('❌', result.message || 'Error saving', '#ef4444');
                }
            } catch (e) {
                showToast('❌', 'Network error — try again', '#ef4444');
            }
        }
    }

    // ── MANUAL ──
    let manualOpen = false;
    function toggleManual() {
        manualOpen = !manualOpen;
        document.getElementById('manual-area').classList.toggle('hidden', !manualOpen);
    }
    function submitManual() {
        const cartNum  = document.getElementById('manual-cart').value.trim().toUpperCase();
        const cartType = document.getElementById('manual-type').value;
        const duration = document.getElementById('manual-duration').value;
        const idType   = document.getElementById('manual-idtype').value;
        if (!cartNum || !cartType) { showToast('⚠️', 'Fill in Cart # and Type', '#f59e0b'); return; }
        processCartScan(cartNum, cartType, duration, idType);
        document.getElementById('manual-cart').value = '';
    }

    // ── DELETE ──
    async function deleteRecord(id) {
        if (!confirm('Remove this record?')) return;
        try {
            const res    = await apiFetch('api.php?action=deleteCartLog', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id })
            });
            const result = await res.json();
            if (result.success) {
                showToast('🗑️', 'Record removed', '#64748b');
                await loadCartLogs();
            } else {
                showToast('❌', result.message || 'Could not delete', '#ef4444');
            }
        } catch (e) {
            showToast('❌', 'Network error', '#ef4444');
        }
    }

    // ── RENDER TABLE ──
    function renderTable() {
        const tbody = document.getElementById('tracker-table-body');
        // Use PH time for 'now' so live duration matches DB-stored PH timestamps.
        const nowPH   = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Manila' }));
        const isAdmin = currentUser?.role === 'admin';

        // Update thead with branch column for admin
        document.getElementById('table-head-row').innerHTML = `
            ${isAdmin ? '<th class="px-4 py-3 text-left">Branch</th>' : ''}
            <th class="px-4 py-3 text-left">Cart #</th>
            <th class="px-4 py-3 text-left">Type</th>
            <th class="px-4 py-3 text-left">Valid ID</th>
            <th class="px-4 py-3 text-left">Time In</th>
            <th class="px-4 py-3 text-left">Time Out</th>
            <th class="px-4 py-3 text-left">Duration</th>
            <th class="px-4 py-3 text-left">Overtime</th>
            <th class="px-4 py-3 text-left">Status</th>
            <th class="px-4 py-3 text-left">Actions</th>
        `;

        if (!cartRecords.length) {
            tbody.innerHTML = `<tr><td colspan="${isAdmin ? 10 : 9}" class="px-4 py-12 text-center text-slate-400 text-sm">
                <div class="flex flex-col items-center gap-2">
                    <svg class="w-10 h-10 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/>
                    </svg>
                    <p class="font-semibold">No carts scanned yet</p>
                    <p class="text-xs text-slate-300">Press "Scan QR Code" to get started</p>
                </div>
            </td></tr>`;
            document.getElementById('stat-active').textContent   = 0;
            document.getElementById('stat-returned').textContent = 0;
            document.getElementById('stat-overtime').textContent = 0;
            return;
        }

        let active = 0, returned = 0, overtime = 0;

        // DB stores Philippine time via CONVERT_TZ(NOW(),'+00:00','+08:00').
        // Parse as local time directly - no offset adjustment needed.
        // DB now stores PH time via CONVERT_TZ - parse as local time, no offset needed
        const phDate = dt => dt ? new Date(dt.replace(' ', 'T')) : null;

        const fmtTime = dt => {
            if (!dt) return '—';
            const d = phDate(dt);
            let h = d.getHours(), m = String(d.getMinutes()).padStart(2,'0');
            const ap = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            return `${h}:${m} ${ap}`;
        };

        const rows = cartRecords.map(r => {
            const isOut      = !!r.time_out;
            if (!isOut) active++; else returned++;

            const timeInDate  = phDate(r.time_in);
            const timeOutDate = isOut ? phDate(r.time_out) : nowPH;
            const mins        = Math.floor((timeOutDate - timeInDate) / 60000);
            const durationStr = mins >= 0 ? mins + ' min' : '—';

            let otStr = '—';
            if (r.overtime_minutes) {
                otStr = r.overtime_minutes + ' min';
                overtime++;
            } else if (!isOut && r.duration_minutes && mins > r.duration_minutes) {
                otStr = (mins - r.duration_minutes) + ' min';
                overtime++;
            }

            const typeLabel   = { wheelchair: '♿ Wheelchair', kiddiecart: '🛒 Kiddie Cart', scooter: '🛴 Scooter' }[r.cart_type] || r.cart_type;

            const idTypeMap = { senior: { label: '🧓 Senior', bg: 'bg-blue-100 text-blue-800' }, pwd: { label: '♿ PWD', bg: 'bg-purple-100 text-purple-800' }, regular: { label: 'Regular', bg: 'bg-slate-100 text-slate-500' } };
            const idInfo    = idTypeMap[r.id_type] || idTypeMap['regular'];
            const idBadge   = `<span class="inline-flex px-2 py-0.5 rounded-full text-[10px] font-bold ${idInfo.bg}">${idInfo.label}</span>`;

            const statusBadge = isOut
                ? `<span class="badge-out inline-flex px-2 py-0.5 rounded-full text-[10px] font-bold">Returned</span>`
                : `<span class="badge-in inline-flex px-2 py-0.5 rounded-full text-[10px] font-bold">Active</span>`;
            const otBadge     = otStr !== '—'
                ? `<span class="badge-ot inline-flex px-2 py-0.5 rounded-full text-[10px] font-bold">${otStr}</span>`
                : `<span class="text-slate-400 text-xs">—</span>`;

            return `<tr class="border-b border-slate-50 hover:bg-slate-50/50 transition-colors">
                ${isAdmin ? `<td class="px-4 py-3 text-xs text-slate-500 font-semibold capitalize">${r.branch}</td>` : ''}
                <td class="px-4 py-3 font-bold text-sm text-slate-800">${r.cart_num}</td>
                <td class="px-4 py-3 text-sm text-slate-600">${typeLabel}</td>
                <td class="px-4 py-3">${idBadge}</td>
                <td class="px-4 py-3 text-sm font-semibold text-emerald-700">${fmtTime(r.time_in)}</td>
                <td class="px-4 py-3 text-sm font-semibold ${isOut ? 'text-red-600' : 'text-slate-300'}">${fmtTime(r.time_out)}</td>
                <td class="px-4 py-3 text-sm text-slate-600">${durationStr}</td>
                <td class="px-4 py-3">${otBadge}</td>
                <td class="px-4 py-3">${statusBadge}</td>
                <td class="px-4 py-3">
                    ${isAdmin ? `<button onclick="deleteRecord(${r.id})" class="text-[10px] font-bold text-slate-400 hover:text-red-500 transition-colors uppercase tracking-wide">Remove</button>` : `<span class="text-slate-300 text-xs">—</span>`}
                </td>
            </tr>`;
        });

        tbody.innerHTML = rows.join('');
        document.getElementById('stat-active').textContent   = active;
        document.getElementById('stat-returned').textContent = returned;
        document.getElementById('stat-overtime').textContent = overtime;
    }

    // ── UI HELPERS ──
    function showFeedback(icon, title, sub, bg) {
        const fb = document.getElementById('scan-feedback');
        fb.className = 'rounded-xl px-4 py-3 flex items-center gap-3';
        fb.style.background = bg;
        document.getElementById('feedback-icon').textContent = icon;
        document.getElementById('feedback-cart').textContent = title;
        document.getElementById('feedback-type').textContent = sub;
        fb.classList.remove('hidden');
        if (icon !== '⏳') setTimeout(() => fb.classList.add('hidden'), 3500);
    }
    function showToast(icon, msg, color) {
        const t = document.getElementById('toast');
        document.getElementById('toast-icon').textContent = icon;
        document.getElementById('toast-msg').textContent  = msg;
        t.style.background = color;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2800);
    }

    document.getElementById('tracker-date').addEventListener('change', loadCartLogs);
    document.getElementById('scan-modal').addEventListener('click', function(e) {
        if (e.target === this) closeScanModal();
    });
    </script>
</body>
