<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOMO-CART • Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-bg {
            background-image: url('momocartbg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .login-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.72);
            backdrop-filter: blur(2px);
        }
        .branch-btn {
            transition: all 0.18s ease;
            border: 1.5px solid #e2e8f0;
        }
        .branch-btn:hover {
            border-color: #22d3ee;
            background: #f0fdff;
            color: #0e7490;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #94a3b8;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }
    </style>
</head>
<body class="min-h-screen relative login-bg flex items-center justify-center p-4">

    <div class="relative z-10 w-full max-w-md">

        <!-- Card -->
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">

            <!-- Header -->
            <div class="bg-[#0f172a] px-8 pt-10 pb-8 text-center">
                <img src="logo.png" alt="MOMOCart Logo" class="h-16 mx-auto mb-5 object-contain"
                     onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='block'">
                <div id="logo-fallback" style="display:none" class="mb-5">
                    <h1 class="title-font text-4xl font-bold tracking-tight">
                        <span class="text-[#fde047]">MOMO</span><span class="text-[#22d3ee]">Cart</span>
                    </h1>
                </div>
                <p class="text-slate-400 text-[10px] uppercase tracking-[0.25em] font-semibold">Digital Logbook System</p>
                <div class="mt-5 h-px bg-white/10"></div>
            </div>

            <div class="px-8 py-8 space-y-7">

                <!-- Admin Login -->
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Admin Access</p>
                    <div class="space-y-3">
                        <div class="relative">
                            <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                            </svg>
                            <input id="password-input" type="password" placeholder="Enter admin password"
                                   class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-cyan-400 focus:border-transparent outline-none transition"
                                   onkeydown="if(event.key==='Enter') handleAdminLogin()">
                        </div>
                        <button onclick="handleAdminLogin()"
                                class="w-full btn-gradient text-white font-bold py-3.5 rounded-xl shadow text-sm tracking-wide">
                            SIGN IN AS ADMIN
                        </button>
                    </div>
                </div>

                <!-- Divider -->
                <div class="divider">Branch Login</div>

                <!-- Branch Buttons -->
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Select your branch</p>
                    <div class="grid grid-cols-3 gap-3">
                        <button onclick="showBranchModal('pampanga')"
                                class="branch-btn bg-white text-slate-700 font-bold py-4 px-2 rounded-xl text-xs flex flex-col items-center gap-2">
                            <svg class="w-5 h-5 text-cyan-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                            Pampanga
                        </button>
                        <button onclick="showBranchModal('baliwag')"
                                class="branch-btn bg-white text-slate-700 font-bold py-4 px-2 rounded-xl text-xs flex flex-col items-center gap-2">
                            <svg class="w-5 h-5 text-cyan-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                            Baliwag
                        </button>
                        <button onclick="showBranchModal('trinoma')"
                                class="branch-btn bg-white text-slate-700 font-bold py-4 px-2 rounded-xl text-xs flex flex-col items-center gap-2">
                            <svg class="w-5 h-5 text-cyan-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                            Trinoma
                        </button>
                    </div>
                </div>

            </div>

            <!-- Footer bar -->
            <div class="bg-slate-50 border-t border-slate-100 px-8 py-4 text-center">
                <p class="text-[10px] text-slate-400 tracking-widest uppercase">MOMOCart — All rights reserved</p>
            </div>

        </div>
    </div>

    <!-- Branch Password Modal -->
    <dialog id="branch-modal" class="w-full max-w-sm rounded-2xl p-0 shadow-2xl overflow-hidden backdrop:bg-black/60">
        <div class="bg-[#0f172a] px-8 py-6 text-center">
            <img src="logo.png" alt="MOMOCart" class="h-10 mx-auto mb-3 object-contain"
                 onerror="this.style.display='none'">
            <p id="branch-modal-sub" class="text-slate-300 text-xs uppercase tracking-widest font-semibold mt-1">Branch Login</p>
        </div>
        <div class="p-7 bg-white space-y-4">
            <div class="relative">
                <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
                <input id="branch-password-input" type="password" placeholder="Branch password"
                       class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-cyan-400 focus:border-transparent outline-none transition"
                       onkeydown="if(event.key==='Enter') submitBranchLogin()">
            </div>
            <p id="branch-login-error" class="hidden text-red-500 text-xs font-semibold text-center">Incorrect password. Please try again.</p>
            <button onclick="submitBranchLogin()"
                    class="w-full btn-gradient text-white font-bold py-3.5 rounded-xl shadow text-sm tracking-wide">
                SIGN IN
            </button>
            <button onclick="closeBranchModal()"
                    class="w-full text-slate-400 font-semibold py-2 text-sm hover:text-slate-700 transition-colors">
                Cancel
            </button>
        </div>
    </dialog>

    <script src="script.js"></script>
</body>
</html>
